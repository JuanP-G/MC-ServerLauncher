name: Release (Linux AppImage)

# Builds a self-contained Linux x64 AppImage and attaches it to the GitHub release.
# Triggers when a release is published, or manually (pick a tag).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the AppImage to (e.g. v1.1.0)"
        required: true

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libfuse2

      - name: Publish (linux-x64, self-contained)
        run: |
          dotnet publish McServerLauncher/McServerLauncher.csproj \
            -c Release -r linux-x64 --self-contained \
            -p:PublishSingleFile=false \
            -o publish-linux

      - name: Build AppDir
        run: |
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/applications" "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          # App files
          cp -r publish-linux/* "$APPDIR/usr/bin/"
          chmod +x "$APPDIR/usr/bin/McServerLauncher"

          # Icon (convert the .ico to a 256x256 PNG)
          convert "McServerLauncher/Resources/app.ico[0]" -resize 256x256 "$APPDIR/usr/share/icons/hicolor/256x256/apps/mcserverlauncher.png"
          cp "$APPDIR/usr/share/icons/hicolor/256x256/apps/mcserverlauncher.png" "$APPDIR/mcserverlauncher.png"

          # .desktop entry
          cat > "$APPDIR/mcserverlauncher.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=MC Server Launcher
          Comment=Manage your Minecraft servers
          Exec=McServerLauncher
          Icon=mcserverlauncher
          Categories=Game;Utility;
          Terminal=false
          EOF
          cp "$APPDIR/mcserverlauncher.desktop" "$APPDIR/usr/share/applications/"

          # AppRun launcher
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/McServerLauncher" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir MC-ServerLauncher-x86_64.AppImage

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$TAG" MC-ServerLauncher-x86_64.AppImage --clobber --repo "${{ github.repository }}"
